name: Secure Python Test Suite

on:
  pull_request_target:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          # Explicitly target the PR code, as pull_request_target defaults to base
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Revert Testing Suites to Pristine Baseline
        run: |
          git fetch origin main
          
          # Wipe any modifications the agent made to testing suites or workflows
          git checkout origin/main -- tests/
          git checkout origin/main -- frontend/src/components/NlpHelperToolbar.test.tsx
          git checkout origin/main -- frontend/src/hooks/useTextSelection.test.ts
          git checkout origin/main -- .github/workflows/

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Pristine Test Suite
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=95 tests/
